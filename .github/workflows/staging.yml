name: Deploy to Staging (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/staging.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite absolute paths for GitHub Pages
        run: |
          find site -name '*.html' -print0 | xargs -0 sed -i \
            -e 's|href="/\([^"]\)|href="/bdx-website/\1|g' \
            -e 's|src="/\([^"]\)|src="/bdx-website/\1|g' \
            -e 's|content="/\([^"]\)|content="/bdx-website/\1|g' \
            -e 's|href="/"|href="/bdx-website/"|g'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
